name: CI & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  ci-and-release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install Node dependencies
        run: pnpm install

      - name: Frontend Typecheck
        run: pnpm exec tsc --noEmit

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Rust Cargo Check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      # Build and draft a release on tag push
      - name: Build and Publish Tauri App
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # Uses version from tauri.conf.json
          releaseName: 'Glide v__VERSION__'
          releaseBody: 'See the assets below to download and install Glide.'
          releaseDraft: true
          prerelease: false
